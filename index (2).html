        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", "Heiti TC", sans-serif;
            background: #f5f7fa;
            color: #333;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #1e3a5f 0%, #2c5282 100%);
            color: white;
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        header p {
            opacity: 0.9;
            font-size: 15px;
        }

        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            text-align: center;
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card.pending {
            border-top: 4px solid #e53e3e;
        }

        .stat-card.completed {
            border-top: 4px solid #38a169;
        }

        .stat-card.total {
            border-top: 4px solid #3182ce;
        }

        .stat-number {
            font-size: 36px;
            font-weight: bold;
            margin: 10px 0;
        }

        .stat-card.pending .stat-number { color: #e53e3e; }
        .stat-card.completed .stat-number { color: #38a169; }
        .stat-card.total .stat-number { color: #3182ce; }

        .stat-label {
            color: #718096;
            font-size: 14px;
        }

        .controls {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-primary {
            background: #3182ce;
            color: white;
        }

        .btn-success {
            background: #38a169;
            color: white;
        }

        .btn-warning {
            background: #d69e2e;
            color: white;
        }

        .btn-danger {
            background: #e53e3e;
            color: white;
        }

        .btn-secondary {
            background: #718096;
            color: white;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .filter-btn.active {
            background: #3182ce;
            color: white;
            border-color: #3182ce;
        }

        .filter-btn:hover:not(.active) {
            border-color: #3182ce;
            color: #3182ce;
        }

        .search-box {
            padding: 10px 15px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            width: 250px;
            transition: border-color 0.2s;
        }

        .search-box:focus {
            outline: none;
            border-color: #3182ce;
        }

        .table-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f7fafc;
        }

        th {
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
            border-bottom: 2px solid #e2e8f0;
            white-space: nowrap;
        }

        td {
            padding: 14px 16px;
            border-bottom: 1px solid #edf2f7;
            font-size: 14px;
            vertical-align: middle;
        }

        tr:hover {
            background: #f7fafc;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-pending {
            background: #fed7d7;
            color: #c53030;
        }

        .status-completed {
            background: #c6f6d5;
            color: #276749;
        }

        .action-btns {
            display: flex;
            gap: 6px;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            font-family: inherit;
            transition: all 0.2s;
        }

        .action-btn:hover {
            opacity: 0.8;
        }

        .action-btn.edit {
            background: #ebf8ff;
            color: #3182ce;
        }

        .action-btn.complete {
            background: #f0fff4;
            color: #38a169;
        }

        .action-btn.delete {
            background: #fff5f5;
            color: #e53e3e;
        }

        .action-btn.reopen {
            background: #fffaf0;
            color: #d69e2e;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-header {
            padding: 24px 24px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-header h2 {
            font-size: 20px;
            color: #2d3748;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #a0aec0;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: #f7fafc;
            color: #e53e3e;
        }

        .modal-body {
            padding: 24px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
            color: #4a5568;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 6px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #3182ce;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .modal-footer {
            padding: 0 24px 24px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #a0aec0;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 8px;
            color: #718096;
        }

        @media print {
            .controls, .action-btns, .modal-overlay, header p {
                display: none !important;
            }

            header {
                background: white !important;
                color: black !important;
                box-shadow: none !important;
                border: 2px solid #333;
            }

            body {
                background: white;
            }

            .table-container {
                box-shadow: none;
                border: 1px solid #ddd;
            }

            .stats-bar {
                display: none;
            }
        }

        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            .search-box {
                width: 100%;
            }

            .filter-group {
                justify-content: center;
            }

            th, td {
                padding: 10px 8px;
                font-size: 13px;
            }

            .action-btns {
                flex-direction: column;
            }
        }

        .date-display {
            white-space: nowrap;
        }

        .device-id {
            font-family: monospace;
            font-weight: 600;
            color: #3182ce;
            background: #ebf8ff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 設備維修清單管理系統</h1>
            <p>澳門展智服務協會 · 啟智早期訓練中心 · 設備維修記錄</p>
        </header>

        <div class="stats-bar">
            <div class="stat-card pending">
                <div class="stat-label">待維修設備</div>
                <div class="stat-number" id="pendingCount">0</div>
            </div>
            <div class="stat-card completed">
                <div class="stat-label">維修完畢</div>
                <div class="stat-number" id="completedCount">0</div>
            </div>
            <div class="stat-card total">
                <div class="stat-label">設備總數</div>
                <div class="stat-number" id="totalCount">0</div>
            </div>
        </div>

        <div class="controls">
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="openModal()">
                    <span>➕</span> 新增設備
                </button>
                <button class="btn btn-secondary" onclick="exportToExcel()">
                    <span>📊</span> 匯出Excel
                </button>
                <button class="btn btn-secondary" onclick="window.print()">
                    <span>🖨️</span> 列印
                </button>
            </div>

            <div style="display:flex; gap:10px; flex-wrap:wrap; align-items:center;">
                <div class="filter-group">
                    <button class="filter-btn active" onclick="setFilter('all')">全部</button>
                    <button class="filter-btn" onclick="setFilter('pending')">待維修</button>
                    <button class="filter-btn" onclick="setFilter('completed')">維修完畢</button>
                </div>
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 搜尋設備名稱、編號..." oninput="renderTable()">
            </div>
        </div>

        <div class="table-container">
            <table id="deviceTable">
                <thead>
                    <tr>
                        <th>設備編號</th>
                        <th>設備名稱</th>
                        <th>類型</th>
                        <th>位置</th>
                        <th>故障描述</th>
                        <th>報修日期</th>
                        <th>維修日期</th>
                        <th>狀態</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                </tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                <h3>暫無設備記錄</h3>
                <p>請點擊「新增設備」開始記錄</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增設備</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="deviceForm">
                    <input type="hidden" id="editId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>設備編號 *</label>
                            <input type="text" id="deviceId" placeholder="例如：PC-001" required>
                        </div>
                        <div class="form-group">
                            <label>設備名稱 *</label>
                            <input type="text" id="deviceName" placeholder="例如：辦公室電腦" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>設備類型</label>
                            <select id="deviceType">
                                <option value="">請選擇</option>
                                <option value="電腦設備">電腦設備</option>
                                <option value="網絡設備">網絡設備</option>
                                <option value="打印機">打印機</option>
                                <option value="投影機">投影機</option>
                                <option value="音響設備">音響設備</option>
                                <option value="家具">家具</option>
                                <option value="電器">電器</option>
                                <option value="其他">其他</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>所在位置</label>
                            <input type="text" id="location" placeholder="例如：辦公室A">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>故障描述</label>
                        <textarea id="issue" placeholder="請描述設備故障情況..."></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>報修日期</label>
                            <input type="date" id="reportDate">
                        </div>
                        <div class="form-group">
                            <label>維修日期</label>
                            <input type="date" id="repairDate">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>狀態</label>
                        <select id="status">
                            <option value="pending">待維修</option>
                            <option value="completed">維修完畢</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>備註</label>
                        <textarea id="notes" placeholder="其他補充資料..."></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveDevice()">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 初始化資料（示範用，實際使用時會從 localStorage 讀取）
        let devices = JSON.parse(localStorage.getItem('repairDevices')) || [
            {
                id: 'PC-001',
                name: '辦公室電腦',
                type: '電腦設備',
                location: '辦公室A',
                issue: '無法開機，電源指示燈不亮',
                reportDate: '2026-06-10',
                repairDate: '',
                status: 'pending',
                notes: '已聯絡供應商上門檢查'
            },
            {
                id: 'PR-002',
                name: '彩色打印機',
                type: '打印機',
                location: '文儀室',
                issue: '卡紙，無法正常進紙',
                reportDate: '2026-06-08',
                repairDate: '2026-06-12',
                status: 'completed',
                notes: '已更換進紙滾輪'
            },
            {
                id: 'NET-003',
                name: '無線路由器',
                type: '網絡設備',
                location: '機房',
                issue: 'WiFi 訊號不穩定，經常斷線',
                reportDate: '2026-06-14',
                repairDate: '',
                status: 'pending',
                notes: ''
            }
        ];

        let currentFilter = 'all';
        let editingId = null;

        function saveToStorage() {
            localStorage.setItem('repairDevices', JSON.stringify(devices));
        }

        function generateId() {
            const prefix = 'DEV';
            const num = String(devices.length + 1).padStart(3, '0');
            return prefix + '-' + num;
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.getDate().toString().padStart(2, '0') + '/' + 
                   (d.getMonth() + 1).toString().padStart(2, '0') + '/' + 
                   d.getFullYear();
        }

        function renderTable() {
            const tbody = document.getElementById('tableBody');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();

            let filtered = devices.filter(d => {
                const matchFilter = currentFilter === 'all' || d.status === currentFilter;
                const matchSearch = !searchTerm || 
                    d.id.toLowerCase().includes(searchTerm) ||
                    d.name.toLowerCase().includes(searchTerm) ||
                    d.type.toLowerCase().includes(searchTerm) ||
                    d.location.toLowerCase().includes(searchTerm) ||
                    d.issue.toLowerCase().includes(searchTerm);
                return matchFilter && matchSearch;
            });

            // 排序：待維修在前，按報修日期倒序
            filtered.sort((a, b) => {
                if (a.status !== b.status) {
                    return a.status === 'pending' ? -1 : 1;
                }
                return new Date(b.reportDate) - new Date(a.reportDate);
            });

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                document.getElementById('emptyState').style.display = 'block';
            } else {
                document.getElementById('emptyState').style.display = 'none';
                tbody.innerHTML = filtered.map(device => `
                    <tr>
                        <td><span class="device-id">${device.id}</span></td>
                        <td><strong>${device.name}</strong></td>
                        <td>${device.type || '-'}</td>
                        <td>${device.location || '-'}</td>
                        <td>${device.issue || '-'}</td>
                        <td class="date-display">${formatDate(device.reportDate)}</td>
                        <td class="date-display">${formatDate(device.repairDate)}</td>
                        <td>
                            <span class="status-badge status-${device.status}">
                                ${device.status === 'pending' ? '🔴 待維修' : '🟢 維修完畢'}
                            </span>
                        </td>
                        <td>
                            <div class="action-btns">
                                <button class="action-btn edit" onclick="editDevice('${device.id}')">編輯</button>
                                ${device.status === 'pending' 
                                    ? `<button class="action-btn complete" onclick="toggleStatus('${device.id}')">標記完成</button>`
                                    : `<button class="action-btn reopen" onclick="toggleStatus('${device.id}')">重新開啟</button>`
                                }
                                <button class="action-btn delete" onclick="deleteDevice('${device.id}')">刪除</button>
                            </div>
                        </td>
                    </tr>
                `).join('');
            }

            updateStats();
        }

        function updateStats() {
            const pending = devices.filter(d => d.status === 'pending').length;
            const completed = devices.filter(d => d.status === 'completed').length;
            document.getElementById('pendingCount').textContent = pending;
            document.getElementById('completedCount').textContent = completed;
            document.getElementById('totalCount').textContent = devices.length;
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTable();
        }

        function openModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '新增設備';
            document.getElementById('deviceForm').reset();
            document.getElementById('deviceId').value = generateId();
            document.getElementById('reportDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('modalOverlay').classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }

        function editDevice(id) {
            const device = devices.find(d => d.id === id);
            if (!device) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '編輯設備';
            document.getElementById('deviceId').value = device.id;
            document.getElementById('deviceName').value = device.name;
            document.getElementById('deviceType').value = device.type;
            document.getElementById('location').value = device.location;
            document.getElementById('issue').value = device.issue;
            document.getElementById('reportDate').value = device.reportDate;
            document.getElementById('repairDate').value = device.repairDate;
            document.getElementById('status').value = device.status;
            document.getElementById('notes').value = device.notes || '';
            document.getElementById('modalOverlay').classList.add('active');
        }

        function saveDevice() {
            const id = document.getElementById('deviceId').value.trim();
            const name = document.getElementById('deviceName').value.trim();

            if (!id || !name) {
                alert('請填寫設備編號和名稱');
                return;
            }

            const deviceData = {
                id: id,
                name: name,
                type: document.getElementById('deviceType').value,
                location: document.getElementById('location').value.trim(),
                issue: document.getElementById('issue').value.trim(),
                reportDate: document.getElementById('reportDate').value,
                repairDate: document.getElementById('repairDate').value,
                status: document.getElementById('status').value,
                notes: document.getElementById('notes').value.trim()
            };

            if (editingId) {
                const idx = devices.findIndex(d => d.id === editingId);
                if (idx !== -1) {
                    devices[idx] = deviceData;
                }
            } else {
                if (devices.find(d => d.id === id)) {
                    alert('設備編號已存在，請使用其他編號');
                    return;
                }
                devices.push(deviceData);
            }

            saveToStorage();
            closeModal();
            renderTable();
        }

        function toggleStatus(id) {
            const device = devices.find(d => d.id === id);
            if (!device) return;

            if (device.status === 'pending') {
                device.status = 'completed';
                device.repairDate = new Date().toISOString().split('T')[0];
            } else {
                device.status = 'pending';
                device.repairDate = '';
            }

            saveToStorage();
            renderTable();
        }

        function deleteDevice(id) {
            if (!confirm('確定要刪除這項設備記錄嗎？')) return;
            devices = devices.filter(d => d.id !== id);
            saveToStorage();
            renderTable();
        }

        function exportToExcel() {
            const headers = ['設備編號', '設備名稱', '類型', '位置', '故障描述', '報修日期', '維修日期', '狀態', '備註'];
            const rows = devices.map(d => [
                d.id,
                d.name,
                d.type,
                d.location,
                d.issue,
                d.reportDate,
                d.repairDate,
                d.status === 'pending' ? '待維修' : '維修完畢',
                d.notes
            ]);

            let csv = '\uFEFF' + headers.join(',') + '\n';
            rows.forEach(row => {
                csv += row.map(cell => `"${(cell || '').replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = '設備維修清單_' + new Date().toISOString().split('T')[0] + '.csv';
            link.click();
        }

        // 點擊 modal 外部關閉
        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // 初始化
        renderTable();
    </script>
</body>
</html>
